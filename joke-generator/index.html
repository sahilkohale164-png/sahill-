<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get a laugh with random jokes from the internet!</p>
            
            <div class="joke-display">
                <div id="jokeContent" class="joke-text">
                    Click the button to get a joke...
                </div>
            </div>

            <div class="controls">
                <button id="getJokeBtn" class="btn-primary" onclick="getRandomJoke()">
                    🎲 Get a Joke
                </button>
                <button id="shareBtn" class="btn-secondary" onclick="shareJoke()" style="display:none;">
                    📤 Share
                </button>
                <button id="copyBtn" class="btn-secondary" onclick="copyToClipboard()" style="display:none;">
                    📋 Copy
                </button>
            </div>

            <div class="loading" id="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div class="joke-counter">
                <p>Jokes Loaded: <span id="counter">0</span></p>
            </div>

            <div class="category-selector">
                <label>Choose Category:</label>
                <select id="categorySelect" onchange="updateCategory()">
                    <option value="any">Any</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div class="joke-history">
                <h3>Recent Jokes:</h3>
                <ul id="historyList">
                    <li>No jokes yet</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
